kind = "web"
previewPath = "/"
title = "Gauteng GreenFlow"
version = "1.0.0"
id = "artifacts/greenflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18926

[services.development]
run = "pnpm --filter @workspace/greenflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/greenflow", "run", "build" ]
publicDir = "artifacts/greenflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18926"
BASE_PATH = "/"
