services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: greenflow
      POSTGRES_PASSWORD: greenflow_pass
      POSTGRES_DB: greenflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Postgres is reachable only on the Compose network unless you publish it, e.g.:
    # ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenflow -d greenflow"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://greenflow:greenflow_pass@db:5432/greenflow
    command: ["pnpm", "--filter", "@workspace/db", "run", "push"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    environment:
      NODE_ENV: production
      PORT: "8000"
      DATABASE_URL: postgresql://greenflow:greenflow_pass@db:5432/greenflow
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8000/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
